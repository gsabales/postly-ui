<div class="container vh-100 d-flex justify-content-center align-items-center">
  <div class="card shadow p-4" style="max-width: 450px; width: 100%">
    <!-- Tab Content -->
    <div class="tab-content">
      <!-- LOGIN -->
      <form class="form-group" [formGroup]="loginFormGroup" (ngSubmit)="login()">
        <div class="tab-pane fade show active" id="login">
          <div class="mb-3">
            <label for="loginEmail" class="form-label"> Username </label>
            <input type="email" id="loginEmail" class="form-control" formControlName="username" />
          </div>
          <div class="mb-3">
            <label for="loginPassword" class="form-label"> Password </label>
            <input
              type="password"
              id="loginPassword"
              class="form-control"
              formControlName="password"
            />
          </div>
          <div class="row mb-3">
            <div class="col-md-6">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="rememberMe" />
                <label class="form-check-label" for="rememberMe"> Remember me </label>
              </div>
            </div>
            <div class="col-md-6 text-md-end">
              <a href="#">Forgot password?</a>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 mb-3">Login</button>
          <div class="text-center">
            <p class="mb-0">Not a member? <a href="#">Register</a></p>
          </div>
        </div>
      </form>
      <!-- REGISTER -->
      <div class="tab-pane fade" id="register">
        <div class="mb-3">
          <label for="registerName" class="form-label">Name</label>
          <input type="text" id="registerName" class="form-control" />
        </div>
        <div class="mb-3">
          <label for="registerUsername" class="form-label">Username</label>
          <input type="text" id="registerUsername" class="form-control" />
        </div>
        <div class="mb-3">
          <label for="registerEmail" class="form-label">Email</label>
          <input type="email" id="registerEmail" class="form-control" />
        </div>
        <div class="mb-3">
          <label for="registerPassword" class="form-label">Password</label>
          <input type="password" id="registerPassword" class="form-control" />
        </div>
        <div class="mb-3">
          <label for="registerRepeatPassword" class="form-label">Confirm Password</label>
          <input type="password" id="registerRepeatPassword" class="form-control" />
        </div>
        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" id="terms" />
          <label class="form-check-label" for="terms">I agree to the terms and conditions</label>
        </div>
        <button type="submit" class="btn btn-success w-100">Register</button>
      </div>
    </div>
  </div>
</div>
